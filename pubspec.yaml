# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.2
  camera: ^0.12.0+1
  image_picker: ^1.1.2
  file_picker: ^11.0.2
  flutter_screenutil: ^5.6.1
  #cross_file_image: ^1.0.0
  #flutter_tesseract_ocr: ^0.4.24
  google_ml_kit: ^0.21.0
  path_provider: ^2.0.15
  permission_handler: ^11.2.0
  intl: ^0.20.2
  step_progress_indicator: ^1.0.2
  capped_progress_indicator: ^0.0.2
  percent_indicator: ^4.2.3
  dio: ^5.8.0+1
  geolocator: ^10.1.0
  google_maps_flutter: ^2.17.0
  image: ^4.1.3
  open_file: ^3.3.2
  flutter_google_places_sdk: ^0.4.3
  syncfusion_flutter_core: ^24.1.47
  side_sheet: ^1.0.4
  carousel_slider: ^4.2.1
  flutter_file_downloader: ^2.0.0
  shared_preferences: ^2.2.2
  google_mlkit_face_detection: ^0.13.2
  flutter_phone_direct_caller: ^2.1.1
  oktoast: ^3.4.0
  flutter_inappwebview: ^6.1.5
  sentry_flutter: ^9.6.0
  flutter_localization: ^0.3.3
  #custom_info_window: ^1.0.1
  signature: ^6.3.0
  url_launcher: ^6.2.5
  sms_autofill: ^2.4.1
#  universal_html: ^2.3.0
  accessibility_tools: ^2.0.0
  pointer_interceptor: ^0.10.1+2
  package_info_plus: ^9.0.0

# google_maps_flutter: ^2.1.8
#  geolocator: ^8.0.1
#  google_mlkit_text_recognition: ^0.6.0
#  firebase_ml_vision: ^0.12.0+3



  http: any
  json_annotation: any
#  camera_android: ^0.10.10+3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.

  flutter_lints: ^3.0.1
  json_serializable: ^6.7.1
  build_runner: ^2.4.6
# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/appIcon.png"
  adaptive_icon_foreground: "assets/appIcon.png"
  adaptive_icon_background: "#0A1D4D"




flutter_native_splash:
    # צבע רקע למסך הפתיחה
    color: "#ffffff"
    image: "assets/appIcon.png"
    android: true
    android_gravity: center
    ios: true
    web: true
    # התאמות מיוחדות ל-Android 12
    android_12:
      image: "assets/appIcon.png"        # התמונה שתופיע גם באנדרואיד 12
      color: "#ffffff"                # צבע רקע
      icon_background_color: "#ffffff" # רקע לאייקון (כדי שלא ייחתך)
      android_gravity: fill

#dependency_overrides:
# camera_android_camerax: ^0.6.13
#dependency_overrides:
#  camera_android_camerax: 0.6.10+3
dependency_overrides:
  web: ^0.5.1

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true
  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/map_style.txt
    - assets/icons/
    - assets/images/
    - assets/fonts/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  fonts:
    - family: PLONI
      fonts:
          - asset: assets/fonts/ploni-bold-aaa.otf
          - asset: assets/fonts/ploni-demibold-aaa.otf
          - asset: assets/fonts/ploni-regular-aaa.otf

